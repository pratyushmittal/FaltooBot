repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: debug-statements
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # remove unused imports
  - repo: https://github.com/hadialqattan/pycln
    rev: v2.6.0
    hooks:
      - id: pycln

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: uv run ty check
        language: system
        types_or: [python, pyi]
      - id: coverage
        name: coverage
        entry: bash -lc 'RUN_FALTOOCHAT_E2E=1 uv run pytest -n auto --cov=faltoobot --cov-report=term-missing:skip-covered --cov-fail-under=78'
        language: system
        pass_filenames: false
        stages: [pre-push]

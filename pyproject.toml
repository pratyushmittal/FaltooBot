[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "faltoobot"
version = "0.1.0"
description = "WhatsApp-first LLM bot"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "neonize>=0.3.15.post0",
  "openai>=1.107.0",
  "prompt_toolkit>=3.0.51",
  "rich>=14.2.0",
]

[project.scripts]
faltoobot = "faltoobot.cli:main"
faltoochat = "faltoobot.chat:main"

[tool.setuptools.packages.find]
include = ["faltoobot*"]

[dependency-groups]
dev = [
    "pytest>=8.4.2",
    "pre-commit>=4.5.1",
    "ruff>=0.15.6",
    "ty>=0.0.23",
]

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
